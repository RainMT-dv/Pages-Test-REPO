<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Teste do GitHub Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 2rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #4af6c3;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        p {
            color: #b3b3ccc;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: #4af6c3;
            color: #1e1e2f;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(74, 246, 195, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Sucesso!</h1>
        <p>Se você está vendo esta página, significa que o seu teste no <strong>GitHub Pages</strong> funcionou perfeitamente.</p>
        <div class="status-badge">Online</div>
    </div>

</body>
</html>
